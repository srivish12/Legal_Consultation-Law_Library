{% extends "base.html" %}
{% load static %}

{% block title %}Create/Edit Lawyer{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'search_lawyer/css/form.css' %}">
    
{% endblock %}  

{% block content %}
<div class="container mt-5">
    <h2>Lawyer Form</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">
            Save Lawyer
        </button>
    </form>
</div>
{% endblock %}
